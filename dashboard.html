<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSM 客户全景看板</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#1a1a2e;--text2:#555770;--text3:#8e90a6;--border:rgba(0,0,0,0.06);--sidebar:#1a1a2e;--sidetext:#a0a0b8;--sideactive:#fff;--g1:linear-gradient(135deg,#1d4ed8,#3b82f6);--g2:linear-gradient(135deg,#f093fb,#f5576c);--g3:linear-gradient(135deg,#06b6d4,#22d3ee);--g4:linear-gradient(135deg,#10b981,#34d399);--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ===== Sidebar ===== */
.sidebar{width:200px;min-height:100vh;background:var(--sidebar);padding:24px 0;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:10}
.sidebar .logo{color:var(--sideactive);font-size:15px;font-weight:700;padding:0 20px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:12px}
.sidebar .logo span{display:block;font-size:11px;font-weight:400;color:var(--sidetext);margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--sidetext);font-size:13px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--sideactive);background:rgba(255,255,255,0.05)}
.nav-item.active{color:var(--sideactive);background:rgba(255,255,255,0.08);border-left-color:#3b82f6;font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar .footer{margin-top:auto;padding:20px;font-size:10px;color:var(--sidetext);opacity:0.5}

/* ===== Main ===== */
.main{margin-left:200px;flex:1;padding:32px;max-width:calc(100vw - 200px)}
.page{display:none}
.page.active{display:block}

/* ===== Dashboard ===== */
.dash h1{font-size:24px;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.dash p{color:var(--text3);font-size:13px;margin-bottom:24px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--g1)}
.kpi.a2::before{background:var(--g2)}.kpi.a3::before{background:var(--g3)}.kpi.a4::before{background:var(--g4)}
.kl{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.kv{font-size:26px;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.cht{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);height:280px}
.cht-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-item{font-size:12px;color:var(--text2)}.stat-item b{color:var(--text)}

/* ===== Customer View ===== */
.ctitle{font-size:20px;font-weight:700;margin-bottom:4px}
.ctitle span{font-size:12px;font-weight:400;color:var(--text3);margin-left:8px}
.csub{font-size:12px;color:var(--text3);margin-bottom:20px}
.sbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sbar input{flex:1;min-width:160px;padding:9px 12px;border:1px solid #e8ecf1;border-radius:8px;font-size:13px;outline:none;background:var(--card)}
.sbar input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.sbar select{padding:9px 12px;border:1px solid #e8ecf1;border-radius:8px;font-size:12px;cursor:pointer;background:var(--card)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.cn{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.c-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-flex;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:500}
.tl{background:rgba(37,99,235,.1);color:#2563eb}
.to{background:rgba(245,158,11,.1);color:#b45309}
.ty{background:rgba(16,185,129,.1);color:#059669}
.tn{background:rgba(239,68,68,.1);color:#ef4444}
.cf{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px;color:var(--text2);line-height:1.8}
.cf .fl{color:var(--text3)}
.cf .fv{color:var(--text)}
.csummary{font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid #e8ecf1;line-height:1.5}

/* ===== Data Table ===== */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;padding:12px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e8ecf1;white-space:nowrap;background:var(--bg)}
table.data td{padding:10px 14px;border-bottom:1px solid #e8ecf1;color:var(--text)}
table.data tr:hover td{background:rgba(37,99,235,0.03)}
table.data .num{color:var(--text3);font-size:11px;width:32px;text-align:center}
table.data .name{font-weight:600;color:var(--text)}
table.data .ind{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-size:12px}
table.data .summary{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-size:12px}
table.data .tag-sm{display:inline-flex;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:500}
table.data .tbl{background:rgba(37,99,235,.1);color:#2563eb}
table.data .tbo{background:rgba(245,158,11,.1);color:#b45309}
table.data .tby{background:rgba(16,185,129,.1);color:#059669}
table.data .tbn{background:rgba(239,68,68,.1);color:#ef4444}

.loading{text-align:center;padding:60px;color:var(--text3);font-size:14px}
.footer-info{font-size:11px;color:var(--text3);margin-top:20px;text-align:center}
</style>
</head>
<body>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
  <div class="logo">CSM 看板<span>客户全景管理系统</span></div>
  <div class="nav-item active" onclick="switchPage('dash')">
    <span class="icon">&#9632;</span> 仪表板
  </div>
  <div class="nav-item" onclick="switchPage('customers')">
    <span class="icon">&#9644;</span> 全量客户看板
  </div>
  <div class="footer">基于飞书大宽表 · v1.0</div>
</div>

<!-- ===== Main ===== -->
<div class="main">

  <!-- Page: Dashboard -->
  <div class="page active" id="page-dash">
    <div class="dash">
      <h1>仪表板</h1>
      <p>客户数据总览 &middot; 关键指标分布</p>

      <div class="grid4">
        <div class="kpi"><div class="kl">客户总数</div><div class="kv" id="kpi1">—</div></div>
        <div class="kpi a2"><div class="kl">已拜访</div><div class="kv" style="background:var(--g2);-webkit-background-clip:text" id="kpi2">—</div></div>
        <div class="kpi a3"><div class="kl">独立经营</div><div class="kv" style="background:var(--g3);-webkit-background-clip:text" id="kpi3">—</div></div>
        <div class="kpi a4"><div class="kl">联合经营</div><div class="kv" style="background:var(--g4);-webkit-background-clip:text" id="kpi4">—</div></div>
      </div>

      <div class="stat-row" id="levelRow"></div>

      <div class="grid2">
        <div class="cht" id="chartLevel"><div class="cht-title">客户等级分布</div></div>
        <div class="cht" id="chartMode"><div class="cht-title">经营模式分布</div></div>
      </div>

      <div class="stat-row" style="justify-content:center" id="heroStats"></div>
    </div>
  </div>

  <!-- Page: Full Customer View -->
  <div class="page" id="page-customers">
    <div class="ctitle">全量客户看板 <span id="totalLabel">32家</span></div>
    <div class="csub">仅展示关键字段 · 可筛选排序</div>

    <div class="sbar">
      <input type="text" id="q" placeholder="搜索客户名称..." oninput="filter()">
      <select id="fl" onchange="filter()"><option value="">全部等级</option></select>
      <select id="fm" onchange="filter()"><option value="">独立/联合</option><option value="独立">独立经营</option><option value="联合">联合经营</option></select>
      <select id="fv" onchange="filter()"><option value="">拜访状态</option><option value="是">已拜访</option><option value="否">未拜访</option></select>
      <span style="font-size:12px;color:var(--text3)" id="rcnt"></span>
    </div>

    <div class="table-wrap" id="list"><div class="loading">加载中...</div></div>

    <div class="footer-info" id="footerInfo">数据加载中...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

// ====== Dashboard ======
function renderDashboard() {
  const all = customers;
  const visited = all.filter(c => String(c['是否已拜访']||'').includes('是')).length;
  const indep = all.filter(c => String(c['销售模式']||'').includes('独立')).length;
  const joint = all.filter(c => String(c['销售模式']||'').includes('联合')).length;

  document.getElementById('kpi1').textContent = all.length;
  document.getElementById('kpi2').textContent = visited;
  document.getElementById('kpi3').textContent = indep;
  document.getElementById('kpi4').textContent = joint;

  const lv = {};
  all.forEach(c => { const l = c['客户等级']; if(l) lv[l] = (lv[l]||0)+1; });
  document.getElementById('levelRow').innerHTML = Object.entries(lv).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<span class="stat-item"><b>${k}</b>: ${v}家</span>`).join('');

  document.getElementById('heroStats').innerHTML =
    `<span class="stat-item"><b>${all.length}</b> 家 · <b>${visited}</b> 已拜访 · <b>${all.length-visited}</b> 待拜访</span>` +
    `<span class="stat-item">年费 <b>${all.filter(c=>String(c['买断|年费']||'').includes('年费')).length}</b> · 买断 <b>${all.filter(c=>String(c['买断|年费']||'').includes('买断')).length}</b></span>`;

  // Charts
  const lv2 = {}; all.forEach(c => { const l = c['客户等级']||'未分类'; lv2[l]=(lv2[l]||0)+1; });
  const md = {}; all.forEach(c => { const m = c['销售模式']||'未知'; md[m]=(md[m]||0)+1; });
  pie('chartLevel', lv2, ['#2563eb','#f59e0b','#10b981','#8e90a6']);
  pie('chartMode', md, ['#1d4ed8','#06b6d4','#f093fb','#8e90a6']);
}

function pie(id, mp, cl) {
  const el = document.getElementById(id);
  if(!el) return;
  if(charts[id]) charts[id].dispose();
  const nm = Object.keys(mp), vl = Object.values(mp);
  if(!nm.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">暂无数据</div>'; return; }
  const c = echarts.init(el);
  charts[id] = c;
  c.setOption({
    tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
    series:[{type:'pie',radius:['35%','65%'],center:['50%','55%'],
      itemStyle:{borderRadius:6,borderColor:'#fff',borderWidth:2},
      label:{show:true,formatter:'{b}\\n{d}%',fontSize:11,color:'#555770'},
      data:nm.map((n,i)=>({name:n,value:vl[i],itemStyle:{color:cl[i%cl.length]}}))}]
  });
}

// ====== Customer Table (7 columns) ======
function renderCustomers(data) {
  // Populate level filter
  const lvSet = new Set();
  data.forEach(c => { if(c['客户等级']) lvSet.add(c['客户等级']); });
  const sel = document.getElementById('fl');
  // Keep only the first option (全部等级) and add new ones
  while(sel.options.length > 1) sel.remove(1);
  lvSet.forEach(l => { const o = document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });

  const list = document.getElementById('list');
  if(!data||!data.length){list.innerHTML='<div class="loading">暂无数据</div>';return}

  let html = '<table class="data"><thead><tr>'+
    '<th style="width:36px">#</th>'+
    '<th>客户名称</th>'+
    '<th>客户等级</th>'+
    '<th>经营模式</th>'+
    '<th>买断/年费</th>'+
    '<th>最近合同到期</th>'+
    '<th>最近拜访日期</th>'+
    '<th>拜访概要</th>'+
    '</tr></thead><tbody>';

  data.forEach(function(c, i) {
    // 客户等级: CRM > Excel
    var level = c['customItem187__c-label'] || c['客户等级'] || '—';

    // 经营模式: 判别规则（ownerId = 张帆 → 独立经营）
    var ownerName = c['ownerId-name'] || c['对应销售'] || '';
    var mode = '—';
    if (c['经营模式']) {
      mode = c['经营模式'];
    } else if (ownerName.includes('张帆')) {
      mode = '独立经营';
    } else if (ownerName) {
      mode = '联合经营';
    } else {
      var excelMode = String(c['销售模式']||'');
      if (excelMode.includes('独立')) mode = '独立经营';
      else if (excelMode.includes('联合')) mode = '联合经营';
    }

    // 买断/年费: CRM > Excel
    var contractType = c['customItem319__c-label'] || c['买断|年费'] || '—';

    // 合同到期: CRM expireTime > Excel
    var contractEnd = c['expireTime_formatted'] || c['customItem214__c_formatted'] || c['最近合同的到期时间']||c['合同到期']||'—';
    if (contractEnd && contractEnd.length > 10) contractEnd = contractEnd.substring(0,10);

    // 最近拜访: CRM customItem263__c > Excel
    var visitDate = c['customItem263__c_formatted'] || c['customItem264__c_formatted'] || c['visitLatestTime_formatted'] || c['拜访日期']||'—';
    if (visitDate && visitDate.length > 10) visitDate = visitDate.substring(0,10);

    // 拜访概要: CRM comment > Excel
    var note = c['comment'] || c['跟进记录（6月5日）']||c['跟进记录（6.26邀约）']||c['一句话总结']||'';
    var noteShort = note ? (note.length > 50 ? note.substring(0,50)+'...' : note) : '—';

    var modeTag = '';
    if(mode.includes('独立')) modeTag = '<span class="tag-sm tby">独立经营</span>';
    else if(mode.includes('联合')) modeTag = '<span class="tag-sm tbo">联合经营</span>';
    else modeTag = '<span class="tag-sm" style="background:rgba(142,144,166,.1);color:#8e90a6">'+mode+'</span>';

    var lvTag = level !== '—' ? '<span class="tag-sm tbl">'+level+'</span>' : '—';
    var ctTag = contractType !== '—' ? '<span class="tag-sm '+(contractType.includes('年费')?'tby':'tbn')+'">'+contractType+'</span>' : '—';

    html += '<tr>'+
      '<td class="num">'+(i+1)+'</td>'+
      '<td class="name">'+(c['客户名称']||'未命名')+'</td>'+
      '<td>'+lvTag+'</td>'+
      '<td>'+modeTag+'</td>'+
      '<td>'+ctTag+'</td>'+
      '<td style="font-size:12px;color:var(--text2)">'+contractEnd+'</td>'+
      '<td style="font-size:12px;color:var(--text2)">'+visitDate+'</td>'+
      '<td class="summary" title="'+(note||'')+'">'+noteShort+'</td>'+
      '</tr>';
  });

  html += '</tbody></table>';
  list.innerHTML = html;
  document.getElementById('totalLabel').textContent = data.length+'家';
  document.getElementById('rcnt').textContent = '共 '+data.length+' 条';
}

// ====== Filter ======
function filter() {
  var q = document.getElementById('q').value.trim().toLowerCase();
  var fl = document.getElementById('fl').value;
  var fm = document.getElementById('fm').value;
  var fv = document.getElementById('fv').value;
  var d = customers;
  if(q) d = d.filter(function(c){return Object.values(c).some(function(v){return String(v||'').toLowerCase().includes(q)})});
  if(fl) d = d.filter(function(c){return String(c['客户等级']||'').includes(fl)});
  if(fm) d = d.filter(function(c){return String(c['销售模式']||'').includes(fm)});
  if(fv) d = d.filter(function(c){return String(c['是否已拜访']||'').includes(fv)});
  renderCustomers(d);
}
